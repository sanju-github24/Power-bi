<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160" width="400" height="160">
  <defs>
    <!-- Dark background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c12"/>
      <stop offset="100%" style="stop-color:#0e1018"/>
    </linearGradient>

    <!-- Accent yellow glow -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8ff47"/>
      <stop offset="100%" style="stop-color:#c8e820"/>
    </linearGradient>

    <!-- Cyan glow -->
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#0099cc"/>
    </linearGradient>

    <!-- Icon bar gradient -->
    <linearGradient id="barGrad1" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#00d4ff"/>
    </linearGradient>
    <linearGradient id="barGrad2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#e8ff47;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#e8ff47"/>
    </linearGradient>
    <linearGradient id="barGrad3" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#b48eff;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#b48eff"/>
    </linearGradient>
    <linearGradient id="barGrad4" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#4ade80;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#4ade80"/>
    </linearGradient>
    <linearGradient id="barGrad5" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#e8ff47;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#e8ff47;stop-opacity:0.9"/>
    </linearGradient>

    <!-- Pulse line gradient -->
    <linearGradient id="pulseGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#00d4ff"/>
      <stop offset="70%" style="stop-color:#e8ff47"/>
      <stop offset="100%" style="stop-color:#e8ff47;stop-opacity:0"/>
    </linearGradient>

    <!-- Glow filters -->
    <filter id="glowYellow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowCyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Clip for icon box -->
    <clipPath id="iconClip">
      <rect x="16" y="16" width="96" height="128" rx="16"/>
    </clipPath>
  </defs>

  <!-- Background pill -->
  <rect x="0" y="0" width="400" height="160" rx="20" fill="url(#bgGrad)"/>

  <!-- Subtle grid dots -->
  <g opacity="0.06" fill="#ffffff">
    <circle cx="30" cy="30" r="1"/><circle cx="60" cy="30" r="1"/><circle cx="90" cy="30" r="1"/>
    <circle cx="30" cy="60" r="1"/><circle cx="60" cy="60" r="1"/><circle cx="90" cy="60" r="1"/>
    <circle cx="30" cy="90" r="1"/><circle cx="60" cy="90" r="1"/><circle cx="90" cy="90" r="1"/>
    <circle cx="30" cy="120" r="1"/><circle cx="60" cy="120" r="1"/><circle cx="90" cy="120" r="1"/>
    <circle cx="340" cy="40" r="1"/><circle cx="370" cy="40" r="1"/>
    <circle cx="340" cy="70" r="1"/><circle cx="370" cy="70" r="1"/>
    <circle cx="340" cy="100" r="1"/><circle cx="370" cy="100" r="1"/>
    <circle cx="340" cy="130" r="1"/><circle cx="370" cy="130" r="1"/>
  </g>

  <!-- ── ICON MARK ─────────────────────────────────────── -->
  <!-- Icon container -->
  <rect x="16" y="16" width="96" height="128" rx="16" fill="#111420" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Ambient glow behind bars -->
  <ellipse cx="64" cy="100" rx="38" ry="20" fill="#00d4ff" opacity="0.05"/>
  <ellipse cx="64" cy="95" rx="28" ry="15" fill="#e8ff47" opacity="0.04"/>

  <!-- Bar chart — 5 bars with varying heights -->
  <!-- Bar 1 -->
  <rect x="24" y="88" width="11" height="36" rx="3" fill="url(#barGrad1)"/>
  <!-- Bar 2 — tallest (yellow = highlight) -->
  <rect x="39" y="54" width="11" height="70" rx="3" fill="url(#barGrad2)" filter="url(#glowYellow)"/>
  <!-- Bar 3 -->
  <rect x="54" y="72" width="11" height="52" rx="3" fill="url(#barGrad3)"/>
  <!-- Bar 4 -->
  <rect x="69" y="62" width="11" height="62" rx="3" fill="url(#barGrad4)"/>
  <!-- Bar 5 -->
  <rect x="84" y="79" width="11" height="45" rx="3" fill="url(#barGrad5)"/>

  <!-- Baseline -->
  <line x1="20" y1="128" x2="108" y2="128" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>

  <!-- Pulse line across the top of bars -->
  <polyline
    points="24,88 39,54 54,72 69,62 84,79 100,68"
    fill="none"
    stroke="url(#pulseGrad)"
    stroke-width="1.8"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.7"
  />

  <!-- Dot on peak bar -->
  <circle cx="44" cy="54" r="3.5" fill="#e8ff47" filter="url(#glowYellow)"/>
  <circle cx="44" cy="54" r="1.5" fill="#ffffff"/>

  <!-- Top accent bar on icon box -->
  <rect x="16" y="16" width="48" height="4" rx="2" fill="#e8ff47" opacity="0.9"/>
  <rect x="64" y="16" width="48" height="4" rx="2" fill="#00d4ff" opacity="0.7"/>

  <!-- AI spark indicator — top right of icon -->
  <circle cx="101" cy="28" r="7" fill="#1a1e28" stroke="rgba(232,255,71,0.3)" stroke-width="1"/>
  <text x="101" y="32" text-anchor="middle" font-size="8" fill="#e8ff47" font-family="sans-serif">✦</text>

  <!-- ── WORDMARK ────────────────────────────────────────── -->
  <!-- PULSE — bold display -->
  <text
    x="130" y="82"
    font-family="'Arial Black', 'Helvetica Neue', sans-serif"
    font-size="46"
    font-weight="900"
    letter-spacing="-1"
    fill="#f0f4ff"
  >PULSE</text>

  <!-- BI — accent colored -->
  <text
    x="130" y="82"
    font-family="'Arial Black', 'Helvetica Neue', sans-serif"
    font-size="46"
    font-weight="900"
    letter-spacing="-1"
    fill="none"
  >
    <!-- invisible placeholder to measure -->
  </text>

  <!-- Underline accent bar under PULSE -->
  <rect x="130" y="88" width="175" height="3" rx="1.5" fill="url(#pulseGrad)" opacity="0.8"/>

  <!-- BI label -->
  <rect x="308" y="50" width="42" height="28" rx="6" fill="rgba(232,255,71,0.12)" stroke="rgba(232,255,71,0.3)" stroke-width="1"/>
  <text
    x="329" y="69"
    text-anchor="middle"
    font-family="'Arial Black', 'Helvetica Neue', sans-serif"
    font-size="18"
    font-weight="900"
    letter-spacing="1"
    fill="#e8ff47"
    filter="url(#glowYellow)"
  >BI</text>

  <!-- Tagline -->
  <text
    x="130" y="114"
    font-family="'Courier New', monospace"
    font-size="11"
    font-weight="400"
    letter-spacing="3"
    fill="#6b8aaa"
  >CONVERSATIONAL ANALYTICS</text>

  <!-- ── DECORATIVE ELEMENTS ──────────────────────────────── -->
  <!-- Right side subtle pulse waveform decoration -->
  <polyline
    points="362,60 368,60 371,48 374,72 377,55 380,65 383,65"
    fill="none"
    stroke="#00d4ff"
    stroke-width="1.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.4"
  />

  <!-- Corner accent dots -->
  <circle cx="384" cy="142" r="2" fill="#e8ff47" opacity="0.3"/>
  <circle cx="376" cy="142" r="1.5" fill="#00d4ff" opacity="0.25"/>
  <circle cx="370" cy="142" r="1" fill="#b48eff" opacity="0.2"/>

  <!-- Border glow -->
  <rect x="0.5" y="0.5" width="399" height="159" rx="19.5" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
</svg>
