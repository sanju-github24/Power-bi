<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0e1018"/>
      <stop offset="100%" style="stop-color:#13161e"/>
    </linearGradient>
    <linearGradient id="b1" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#00d4ff"/>
    </linearGradient>
    <linearGradient id="b2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#e8ff47;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#e8ff47"/>
    </linearGradient>
    <linearGradient id="b3" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#b48eff;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#b48eff"/>
    </linearGradient>
    <linearGradient id="b4" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#4ade80;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#4ade80"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Square background with rounded corners -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Top accent strip — yellow + cyan -->
  <rect x="0" y="0" width="16" height="3" rx="2" fill="#e8ff47" opacity="0.95"/>
  <rect x="16" y="0" width="16" height="3" rx="2" fill="#00d4ff" opacity="0.8"/>

  <!-- 4 bars -->
  <!-- Bar 1 - cyan -->
  <rect x="4"  y="17" width="4" height="12" rx="1.5" fill="url(#b1)"/>
  <!-- Bar 2 - yellow (tallest, glowing) -->
  <rect x="10" y="9"  width="4" height="20" rx="1.5" fill="url(#b2)" filter="url(#glow)"/>
  <!-- Bar 3 - purple -->
  <rect x="16" y="13" width="4" height="16" rx="1.5" fill="url(#b3)"/>
  <!-- Bar 4 - green -->
  <rect x="22" y="11" width="4" height="18" rx="1.5" fill="url(#b4)"/>

  <!-- Baseline -->
  <line x1="3" y1="30" x2="29" y2="30" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

  <!-- Pulse line over bars -->
  <polyline
    points="6,17 12,9 18,13 24,11 28,14"
    fill="none"
    stroke="#e8ff47"
    stroke-width="1.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.8"
  />

  <!-- Glowing dot at peak -->
  <circle cx="12" cy="9" r="2" fill="#e8ff47" filter="url(#glow)"/>
  <circle cx="12" cy="9" r="1" fill="#ffffff"/>
</svg>
